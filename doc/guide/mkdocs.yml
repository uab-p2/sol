site_name: P2 - Guía de estudio
site_description: P2 - Guía de estudio
site_author: Programación 2 - UAB

docs_dir: sections
site_dir: html

nav:
  - main(): index.md
  - quest():
      - Intro: campaigns.md
      - Despegue:
          - Intro: auto/campaign_despegue.md
          - Silicio y titanio(): auto/quest_silicio_y_titanio.md
          - Cámara de desinfección(): auto/quest_camara_de_desinfeccion.md
      - Objetos celestes:
          - Intro: auto/campaign_oop.md
          - Entre gatos(): auto/quest_entre_gatos.md
      - Recuerdos sintéticos:
          - Intro: auto/campaign_memory.md
          - Título del Quest(): auto/quest_placeholder.md
  - help():
      - Intro : codices.md
      - Sintaxis : codex_oop_syntax.md
      - Contenedores STL : codex_stl_usage.md

theme:
  name: material
  favicon: asset/img/white-balance-sunny.ico
  language: es

  icon:
    logo: material/white-balance-sunny

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/tune
        name: Light mode

    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/tune
        name: Dark mode

extra_css:
  - asset/css/extra.css

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tilde

plugins:
  - search
  - minify:
      minify_html: true
  - macros

extra:
  generator: false