<script>
let passwordValue = "";

function setPasswordValue(nextValue) {
    passwordValue = nextValue;
    updateDisplay();
}

function appendHexText(text) {
    const sanitized = Array.from(text)
        .filter(char => /[0-9a-f]/i.test(char))
        .map(char => char.toUpperCase())
        .join("");

    if (sanitized.length === 0) {
        return false;
    }

    setPasswordValue(passwordValue + sanitized);
    const status = document.getElementById("decrypt-status");
    status.hidden = true;
    return true;
}

async function decryptTemplate(password) {
    // Read Base64 from the script tag
    const b64 = document.getElementById("template").textContent.trim();

    // Decode Base64
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));

    // Split into components
    const salt = bytes.slice(0, 16);
    const iv = bytes.slice(16, 28);
    const ciphertext = bytes.slice(28);

    // Import password
    const passwordKey = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    // Derive AES key
    const aesKey = await crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt,
            iterations: 1000000,
            hash: "SHA-256",
        },
        passwordKey,
        {
            name: "AES-GCM",
            length: 256,
        },
        false,
        ["decrypt"]
    );

    // Decrypt
    const plaintext = await crypto.subtle.decrypt(
        {
            name: "AES-GCM",
            iv,
        },
        aesKey,
        ciphertext
    );

    return new TextDecoder().decode(plaintext);
}

function updateDisplay() {
    document.getElementById("led-display").textContent = passwordValue;
}

function handleHexKeyPress(key) {
    appendHexText(key);
}

function handleBackspace() {
    setPasswordValue(passwordValue.slice(0, -1));
}

async function handleDecrypt() {
    const status = document.getElementById("decrypt-status");

    status.hidden = false;
    status.textContent = "...";

    try {
        const password = passwordValue.toLowerCase();
        const decryptedHtml = await decryptTemplate(password);
        const parser = new DOMParser();
        const parsed = parser.parseFromString(decryptedHtml, "text/html");
        const replacement = parsed.body.firstElementChild;

        if (!replacement) {
            throw new Error("Decrypted content is empty");
        }

        const encryptedContent = document.getElementById("encrypted-content");
        encryptedContent.replaceWith(replacement);
    } catch (err) {
        status.textContent = "Error!";
        console.error("Decryption failed:", err);
        setPasswordValue("");
    }
}

async function handleDocumentKeydown(event) {
    const target = event.target;
    const isEditableTarget = target instanceof HTMLElement && (
        target.isContentEditable ||
        ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName)
    );

    if (isEditableTarget) {
        return;
    }

    if (event.ctrlKey || event.metaKey) {
        if (event.key.toLowerCase() === "v") {
            // Let native paste happen; handle it in the paste listener.
            return;
        }
        return;
    }

    if (/^[0-9a-f]$/i.test(event.key)) {
        event.preventDefault();
        event.stopPropagation();
        handleHexKeyPress(event.key);
        return;
    }

    if (event.key === "Backspace") {
        event.preventDefault();
        event.stopPropagation();
        handleBackspace();
        return;
    }

    if (event.key === "Enter") {
        event.preventDefault();
        event.stopPropagation();
        handleDecrypt();
    }
}

async function handleDocumentPaste(event) {
    const target = event.target;
    const isEditableTarget = target instanceof HTMLElement && (
        target.isContentEditable ||
        ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName)
    );

    if (isEditableTarget) {
        return;
    }

    let pastedText = event.clipboardData?.getData("text") ?? "";
    if (!pastedText) {
        pastedText = await navigator.clipboard?.readText?.().catch(() => "") ?? "";
    }

    if (!/[0-9a-f]/i.test(pastedText)) {
        return;
    }

    event.preventDefault();
    event.stopPropagation();
    appendHexText(pastedText);
}

// Attach handlers
document.querySelectorAll(".hex-btn").forEach(btn => {
    btn.addEventListener("click", () => handleHexKeyPress(btn.dataset.key));
});

document.getElementById("backspace-btn").addEventListener("click", handleBackspace);
document.getElementById("decrypt-button").addEventListener("click", handleDecrypt);
window.addEventListener("keydown", handleDocumentKeydown, true);
window.addEventListener("paste", handleDocumentPaste, true);
setPasswordValue("");
